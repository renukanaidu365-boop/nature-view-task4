<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beautiful View with Click Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Main container  -->
  <div class="content-container">

    <!-- Card that holds both image and button-->
    <div class="view-card">

      <!-- Image -->
      <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
           alt="Beautiful forest with sun rays through trees" 
           class="nature-image">
      
      <!-- Click Me button-->
      <button class="gradient-btn">Click Me</button>
    </div>

  </div>
</body>
</html>
